name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Batalkan run lama pada ref yang sama saat ada push baru.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # postinstall menjalankan `prisma generate`, jadi client siap sebelum
      # lint/typecheck/build.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      # Build mengimpor modul server (mis. Prisma adapter) yang membaca env
      # saat load. Nilai dummy cukup — build tidak membuka koneksi DB.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?pgbouncer=true
          DIRECT_URL: postgresql://user:pass@localhost:5432/db
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
